[package]
name = "overmatch"
version = "0.2.2"
edition = "2024"
default-run = "overmatch"

[dependencies]
bevy = { version = "0.19", features = ["debug"] }
avian3d = "0.7"

# Per-variant spec sheets are authored as RON data assets (ADR-0010): plain-text,
# git-diffable, deserialized straight into our components via serde.
serde = { version = "1", features = ["derive"] }
# The jitter-trace recorder (`src/trace.rs`) writes JSONL rows for offline analysis. Already in the
# tree transitively (via `gltf`), promoted to a direct dependency for the recorder's use.
serde_json = "1"
ron = "0.12"
# The same glam Bevy already compiles (feature unification) â€” this only switches on its serde
# impls, so `Vec3` can ride in the serializable `TankCommand`.
glam = { version = "0.30", features = ["serde"] }

winit = "0.30"
image = { version = "0.25", default-features = false, features = ["png"] }

# Read a `.glb` directly as data (no Bevy scene): the sim/view-split geometry extractor (`bake`,
# design sim-view-split-and-tank-bake.md) and the specâ†”model bind-contract test. Matches the
# version `bevy_gltf` already resolves, so it adds nothing to the dep tree.
gltf = "1.4"

# Networking spike (feature-gated, see `net` below): behind `optional = true` so the default
# build never pulls it in. `prediction`/`interpolation` are default-on lightyear features (kept
# explicit here for clarity); `avian3d` pulls in `lightyear_avian3d` (increment 5, spike map Â§1/Â§5).
lightyear = { version = "0.28", default-features = false, features = [
    "std",
    "client", "server",
    "replication", "prediction", "interpolation",
    # The render half of prediction (fixed-tickâ†’frame blending; also what arms rollback
    # correction). NOT implied by `prediction` â€” see net::client_smoothing_plugin.
    "frame_interpolation",
    "input_native",
    "netcode", "udp",
    "avian3d",
], optional = true }

# `avian3d/serialize` is additive (Serialize/Deserialize impls on Position/Rotation/velocities) â€”
# only lightyear's replication registration (net.rs) needs it; gated so the default build's avian3d
# feature set is untouched.
[features]
net = ["dep:lightyear", "avian3d/serialize"]

[[bin]]
name = "server"
path = "src/bin/server.rs"
required-features = ["net"]

[[bin]]
name = "client"
path = "src/bin/client.rs"
required-features = ["net"]

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

# CI profile: clippy (type-check) + fast unit tests only, which gain nothing from
# optimized dependencies. Inherit dev but drop every package back to opt-level 0 â€”
# the dev profile's opt-level-3 deps are exactly what make a cold CI build slow (~25
# min) and the rust-cache large (~1.5 GB). Used via `cargo {clippy,test} --profile ci`
# in .github/workflows/ci.yml.
[profile.ci]
inherits = "dev"
opt-level = 0

[profile.ci.package."*"]
opt-level = 0

# Optimized for distribution: strip symbols and shrink code size. These slow
# down compile time (full recompile + LTO), which is fine for release bundles.
[profile.release]
strip = true
lto = "thin"
codegen-units = 1
