name: CI

# Fast feedback on every push to main and every PR: formatting, lints, and tests
# must pass. Keeps the tree fmt-clean and clippy-green so drift can't reaccumulate
# (the release workflow assumes a healthy tree).

on:
  push:
    branches: [main]
  pull_request:

# Supersede in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this job only reads the code, so drop the default token down to
# read-only contents (GitHub/OpenSSF hardening guidance).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast, dependency-free check: formatting is pure text analysis (no system libs, no
  # compile), so it runs on its own runner in parallel with the slow job and a
  # whitespace slip fails in seconds instead of behind a multi-minute Bevy build.
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Formatting
        run: cargo fmt --all --check

  # The heavy job: lints + tests. Uses the `ci` cargo profile (dependencies at
  # opt-level 0, see Cargo.toml), so even a cold build is light and the rust-cache is
  # small; warm runs finish in a few minutes. The ceiling only guards a cold build.
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Pull LFS: the spec-bind test (`tiger_1_spec_binds_to_model`) opens the real
      # `.glb` at runtime to check node names against the RON, so a pointer-file
      # checkout makes it panic on open. The LFS fetch runs during checkout using the
      # job token; `persist-credentials: false` still keeps that token out of the local
      # git config afterward (nothing here pushes).
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          lfs: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Bevy needs these to compile on Linux (alsa/udev + windowing), same as the
      # release build.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev

      - uses: Swatinem/rust-cache@v2

      # `--profile ci` compiles dependencies at opt-level 0 (see Cargo.toml) — far
      # faster to build cold and a smaller cache than the dev profile's opt-level-3
      # deps. `--locked` builds against the committed Cargo.lock, so CI is reproducible
      # and fails loudly if the lockfile drifts from Cargo.toml.
      # Default features now include `net` + `dev_tools`, so this covers the shipping client/server
      # (net) path.
      - name: Clippy
        run: cargo clippy --profile ci --locked --all-targets -- -D warnings

      - name: Tests
        run: cargo test --profile ci --locked

      # ...and the `--no-default-features` path (lib + sandbox, no net/dev_tools) keeps its own
      # coverage — nothing default-on can hide a break in the minimal build.
      - name: Clippy (no default features)
        run: cargo clippy --profile ci --locked --no-default-features --all-targets -- -D warnings

      - name: Tests (no default features)
        run: cargo test --profile ci --locked --no-default-features
