name: CI

# Fast feedback on every push to main and every PR: formatting, lints, and tests
# must pass. Keeps the tree fmt-clean and clippy-green so drift can't reaccumulate
# (the release workflow assumes a healthy tree).

on:
  push:
    branches: [main]
  pull_request:

# Supersede in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this job only reads the code, so drop the default token down to
# read-only contents (GitHub/OpenSSF hardening guidance).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast, dependency-free check: formatting is pure text analysis (no system libs, no
  # compile), so it runs on its own runner in parallel with the slow job and a
  # whitespace slip fails in seconds instead of behind a multi-minute Bevy build.
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Formatting
        run: cargo fmt --all --check

  # Compile-heavy checks share one matrix but run independently. In particular, the
  # 30-receiver UDP probe must not contend with another libtest thread.
  checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        task: [clippy, tests, shot-stress]
    name: check (${{ matrix.task }})
    steps:
      # LFS on R2 via committed `.lfsconfig` (RO). checkout `lfs: true` ignores
      # `.lfsconfig` and still hits GitHub — so pull after checkout.
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          lfs: false
      - name: Git LFS pull (R2)
        run: |
          git lfs install --local
          git lfs pull

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Bevy needs these to compile on Linux (alsa/udev + windowing), same as the
      # release build.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev jq time

      - uses: Swatinem/rust-cache@v2

      # `--profile ci` compiles dependencies at opt-level 0 (see Cargo.toml) — far
      # faster to build cold and a smaller cache than the dev profile's opt-level-3
      # deps. `--locked` builds against the committed Cargo.lock, so CI is reproducible
      # and fails loudly if the lockfile drifts from Cargo.toml.
      # One feature variant: lightyear compiles unconditionally (the PVP client is the product), and
      # `--all-targets` covers the client, server, and both sandbox bins. `dev_tools` is default-on.
      # The retired `--no-default-features` pair proved the sim didn't depend on netcode; that guard
      # now lives in `tests/net_boundary.rs` (a source scan) + `src/headless_test.rs` (boots the sim
      # with no netcode mounted) — no second full build required.
      - name: Clippy
        if: matrix.task == 'clippy'
        run: cargo clippy --profile ci --locked --all-targets -- -D warnings

      - name: Tests
        if: matrix.task == 'tests'
        run: |
          cargo test --profile ci --locked -- \
            --skip net::shot_loss::thirty_combatant_volley_reaches_thirty_independent_receivers_under_loss

      - name: Build shot stress test
        if: matrix.task == 'shot-stress'
        run: |
          set -euo pipefail
          artifacts="${RUNNER_TEMP}/overmatch-test-artifacts.jsonl"
          manifest="$(realpath Cargo.toml)"
          cargo test --profile ci --locked --lib --no-run --message-format=json > "${artifacts}"
          mapfile -t executables < <(
            jq -r --arg manifest "${manifest}" \
              'select(.reason == "compiler-artifact" and .manifest_path == $manifest and .target.kind == ["lib"] and .profile.test and .executable != null) | .executable' \
              "${artifacts}"
          )
          test "${#executables[@]}" -eq 1
          test -x "${executables[0]}"
          printf '%s\n' "${executables[0]}" > "${RUNNER_TEMP}/overmatch-libtest"

      - name: Build shot stress runtime image
        if: matrix.task == 'shot-stress'
        run: |
          docker build --pull \
            --file scripts/ci/shot-stress.Dockerfile \
            --tag overmatch-shot-stress-runtime:ci \
            scripts/ci

      - name: Shot stress test with memory telemetry
        if: matrix.task == 'shot-stress'
        env:
          # DERIVED: four GiB is about ten times the MEASURED prior normal macOS-arm peak while
          # leaving the hosted runner headroom to report a cgroup OOM instead of losing the VM.
          MEMORY_MAX_BYTES: 4294967296
        run: |
          bash scripts/ci/measure-test-memory.sh \
            "$(<"${RUNNER_TEMP}/overmatch-libtest")" \
            net::shot_loss::thirty_combatant_volley_reaches_thirty_independent_receivers_under_loss \
            --exact --test-threads=1 --nocapture

  # Preserve the branch-protection context while requiring every matrix lane above.
  check:
    name: check
    needs: checks
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all check lanes
        env:
          CHECKS_RESULT: ${{ needs.checks.result }}
        run: test "${CHECKS_RESULT}" = success
