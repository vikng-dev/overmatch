name: Deploy to droplet

# Auto-deploy the dedicated server to the DigitalOcean test droplet on every push to `main`.
# Build the Linux `overmatch-server` EXACTLY like the release workflow's dispatch path, then
# scp the payload to the droplet, extract it, and restart the systemd unit — so the droplet
# always runs `main`. See DEPLOY.md ("Auto-deploy") for the operator's view.
#
# Scope: this workflow fires ONLY on branch pushes to `main`. Tag pushes (`vX.Y.Z`) and
# `workflow_dispatch` are handled entirely by release.yml and never reach here, so the full
# release path and the manual scp-redeploy path are untouched.
#
# The server build + package is the shared composite `.github/actions/build-server`, called
# verbatim by release.yml's `upload-server` too — so there is exactly one recipe, no sync burden.
# Here it runs with `deployed-sha: true` to bake the DEPLOYED_SHA marker into the tar.

on:
  push:
    branches: [main]

# Least privilege: we only read the code (the deploy auth is the SSH key secret, not the token).
permissions:
  contents: read

# Serialize droplet deploys. `cancel-in-progress: false` (queue, don't cancel): a running job
# may be mid-scp / mid-extract / mid-restart on the droplet, and cancelling there could leave a
# half-written payload. Queued runs execute in commit order, so the newest push ends up live
# without ever interrupting an in-flight deploy.
concurrency:
  group: deploy-droplet
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # The DigitalOcean test droplet. Not a secret — it's public in DEPLOY.md and baked into release
  # clients. The matching SSH private key is the `DROPLET_SSH_KEY` repo secret; its host key is
  # pinned below.
  DROPLET_HOST: 157.245.48.161

jobs:
  deploy:
    # Skip the whole run (build + deploy) when the head commit says so: `[skip deploy]` merges
    # still get CI (ci.yml), they just don't touch the droplet.
    if: ${{ !contains(github.event.head_commit.message, '[skip deploy]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # --- BUILD ------------------------------------------------------------------------------
      # lfs: true — the server bakes tank geometry from the real .glb at startup, so a pointer-file
      # checkout yields a broken bundle. Checkout stays job-level (a local composite `uses: ./...`
      # only resolves after the repo is on disk).
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          lfs: true

      # The canonical server build + package recipe, shared verbatim with release.yml's
      # `upload-server`. deployed-sha: true bakes a DEPLOYED_SHA marker into the tar so the droplet
      # (and this run's log) can state exactly which commit is live. Leaves overmatch-server.tar.gz
      # in the workspace root for the deploy step below.
      - uses: ./.github/actions/build-server
        with:
          deployed-sha: 'true'

      # --- DEPLOY -----------------------------------------------------------------------------
      # Install the deploy key (0600, in RUNNER_TEMP), pin the droplet's host key, ship the payload,
      # extract into /opt/overmatch-server, restart the unit, and verify (is-active + live SHA).
      - name: Deploy to droplet
        env:
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          set -euo pipefail

          KEY="${RUNNER_TEMP}/deploy_key"
          KNOWN="${RUNNER_TEMP}/known_hosts"

          # Private key from the secret, readable only by us.
          install -m 600 /dev/null "$KEY"
          printf '%s\n' "$DROPLET_SSH_KEY" > "$KEY"

          # Pin the droplet's ed25519 host key (from DEPLOY.md) instead of disabling checking.
          printf '%s\n' \
            '157.245.48.161 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHj3I4r44u/XAIAGlqKqGwLPTrXit3dthCHfcBJo390G' \
            > "$KNOWN"

          SSH_OPTS=(-i "$KEY" -o IdentitiesOnly=yes -o BatchMode=yes \
            -o StrictHostKeyChecking=yes -o "UserKnownHostsFile=$KNOWN")

          # Ship the payload to /opt, then extract + restart + verify on the droplet. The tar's
          # top-level dir is `overmatch-server`, so extracting in /opt refreshes /opt/overmatch-server.
          scp "${SSH_OPTS[@]}" overmatch-server.tar.gz "root@${DROPLET_HOST}:/opt/"
          ssh "${SSH_OPTS[@]}" "root@${DROPLET_HOST}" '
            set -e
            cd /opt
            tar xzf overmatch-server.tar.gz
            systemctl restart overmatch-server
            systemctl is-active overmatch-server
            echo "Deployed SHA on droplet: $(cat /opt/overmatch-server/DEPLOYED_SHA)"
          '
          echo "Pushed commit ${GITHUB_SHA} to the droplet."
