name: Release

# The single build pipeline for the PRODUCT (`overmatch`, the PVP client) and the
# `overmatch-server` (dedicated server). Two triggers:
#
#   - A `vX.Y.Z` tag PUBLISHES a GitHub Release with per-platform archives:
#       * Windows  `overmatch`        — the PVP client, server address baked to the droplet.
#       * Linux    `overmatch`        — the PVP client, server address baked to the droplet.
#       * macOS    `overmatch`        — the client, as a signed + notarized arm64 .dmg (Apple Silicon only).
#       * Linux    `overmatch-server` — the dedicated server, tar with assets/.
#     Cut one by bumping `version` through a PR, deploying that merged main SHA, then tagging it.
#     The create-release gate verifies all three identities before publishing.
#
#   - `workflow_dispatch` builds ONLY the Linux `overmatch-server` and uploads it as a plain
#     artifact for `scp` redeploys to the test droplet (see DEPLOY.md), even if the dispatch is
#     launched from a tag ref. This absorbs the old dedicated `server-build.yml`.
#
# Phase 1 (now): GitHub Releases. Phase 2 (later): the same output feeds Steam via SteamPipe.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'      # stable, e.g. v0.1.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'    # prerelease, e.g. v0.3.0-alpha.1
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # The DigitalOcean test droplet (DEPLOY.md). Baked into the release client at compile time via
  # `option_env!("OVERMATCH_DEFAULT_SERVER")` (net::client::run), so a friend's double-clicked build
  # connects to the droplet with no env set. Overridable at runtime with `OVERMATCH_SERVER`. Every
  # step's cargo build inherits this workflow-level env, so the client jobs need no extra wiring.
  OVERMATCH_DEFAULT_SERVER: 157.245.48.161

jobs:
  # The GitHub Release shell — tag pushes only. A manual dispatch never publishes, even when it is
  # launched from a tag ref. The client/macOS jobs `needs` this, so on a dispatch they skip with it;
  # the server job runs regardless (see its `if`).
  create-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # CARGO_PKG_VERSION participates in the network protocol fingerprint. Reject label/handshake
      # skew and a stale lockfile before creating an empty or misleading GitHub Release shell.
      - name: Verify release versions and tag agree
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(awk -F '"' '/^version[[:space:]]*=/ { print $2; exit }' Cargo.toml)"
          lock_version="$(awk -F '"' '$0 == "name = \"overmatch\"" { found = 1; next } found && /^version =/ { print $2; exit }' Cargo.lock)"
          expected_tag="v${cargo_version}"
          if [[ -z "${cargo_version}" || "${lock_version}" != "${cargo_version}" || "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "::error::Release identity mismatch: tag=${GITHUB_REF_NAME} Cargo.toml=${cargo_version:-<missing>} Cargo.lock=${lock_version:-<missing>}"
            exit 1
          fi
      # A release client must match the server already running on our droplet. Require the tag to
      # name current main, then require a successful, non-skipped deploy job for that exact SHA.
      # This turns the README release order into an enforced invariant rather than operator lore.
      - name: Verify tagged main is deployed
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --depth=1 --no-tags origin +main:refs/remotes/origin/main
          tag_sha="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          main_sha="$(git rev-parse origin/main)"
          if [[ "${tag_sha}" != "${main_sha}" ]]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} points to ${tag_sha}, but origin/main is ${main_sha}"
            exit 1
          fi

          deploy_run_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/runs" \
              --method GET -f branch=main -f event=push -f status=success -f per_page=100 \
              | jq -r --arg sha "${tag_sha}" \
                '[.workflow_runs[] | select(.head_sha == $sha and .conclusion == "success")][0].id // empty'
          )"
          if [[ -z "${deploy_run_id}" ]]; then
            echo "::error::No successful Deploy to droplet workflow run found for ${tag_sha}"
            exit 1
          fi

          deploy_job_conclusion="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${deploy_run_id}/jobs" \
              | jq -r '[.jobs[] | select(.name == "deploy")][0].conclusion // empty'
          )"
          if [[ "${deploy_job_conclusion}" != "success" ]]; then
            echo "::error::Deploy run ${deploy_run_id} did not execute its deploy job successfully (conclusion=${deploy_job_conclusion:-<missing>})"
            exit 1
          fi
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build and package the Windows + Linux PVP clients without a release-write token. Tags only
  # (skips on dispatch with create-release); the small upload-client job below publishes the sealed
  # archives. macOS has the equivalent untrusted-build/trusted-sign split further down.
  # Linux runtime floor follows the current ubuntu-latest runner glibc and requires a Vulkan driver.
  build-client:
    needs: create-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      # LFS on R2 via committed `.lfsconfig` (RO). checkout `lfs: true` ignores
      # `.lfsconfig` and still hits GitHub — so pull after checkout.
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          lfs: false
      - name: Git LFS pull (R2)
        run: |
          git lfs install --local
          git lfs pull

      # The Linux client links alsa/udev + the windowing (X11/Wayland/xkb) stack — it RENDERS, unlike
      # the headless server, but needs the same compile-time libs. (Windows/MSVC needs none.)
      - name: Install Linux build dependencies
        if: contains(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev

      # Ship only runtime assets: the game loads .glb meshes, so drop the build-time Blender sources
      # (.blend1 is gitignored, but prune defensively) AND the stale pre-restructure asset backups
      # under assets/**/backup/ — superseded glb+ron that stays in git but must not ship.
      - name: Prune non-runtime assets
        shell: bash
        run: |
          find assets -type f \( -name '*.blend' -o -name '*.blend1' \) -delete
          find assets -type d -name backup -prune -exec rm -rf {} +

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Build, archive, and checksum without uploading. In dry-run mode the action deliberately
      # withholds github.token from its composite shell, including cargo/build.rs subprocesses.
      # The workflow-level OVERMATCH_DEFAULT_SERVER is baked in via option_env!.
      - name: Build and package client
        id: package-client
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: overmatch
          target: ${{ matrix.target }}
          locked: true
          # e.g. overmatch-v0.3.0-alpha.1-x86_64-pc-windows-msvc.zip
          archive: $bin-$tag-$target
          # Bundle assets/ next to the binary, under a top-level dir so users extract one
          # self-contained folder.
          include: assets
          leading-dir: true
          tar: unix
          zip: windows
          checksum: sha256
          dry-run: true
          dry-run-intended: true

      - uses: actions/upload-artifact@v4
        with:
          name: overmatch-client-${{ matrix.target }}
          path: overmatch-${{ github.ref_name }}-${{ matrix.target }}.*
          compression-level: 0
          retention-days: 1
          if-no-files-found: error

  # Publish only the archives produced above. This job has release-write permission but performs no
  # checkout, compilation, build script, or proc-macro execution.
  upload-client:
    needs: [create-release, build-client]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: overmatch-client-*
          path: dist
          merge-multiple: true

      - name: Attach clients to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            "dist/overmatch-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz"
            "dist/overmatch-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.sha256"
            "dist/overmatch-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.zip"
            "dist/overmatch-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.sha256"
          )
          for asset in "${assets[@]}"; do
            if [[ ! -f "${asset}" ]]; then
              echo "::error::Missing required client release asset: ${asset}"
              exit 1
            fi
          done
          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" \
            --repo "${GITHUB_REPOSITORY}" --clobber

  # Build and package the Linux dedicated server without a release-write token. Runs on BOTH
  # triggers and always uploads a plain workflow artifact for scp redeploys (DEPLOY.md).
  # `needs: create-release` + `if: always()` so it waits for (but isn't gated out by) the release
  # shell on tags, and still runs when create-release is skipped on a dispatch.
  build-server:
    needs: create-release
    if: ${{ always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # LFS on R2 via `.lfsconfig`. Checkout stays job-level so the local composite resolves;
      # pull after checkout (checkout `lfs: true` ignores `.lfsconfig` and hits GitHub).
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          lfs: false
      - name: Git LFS pull (R2)
        run: |
          git lfs install --local
          git lfs pull

      # The canonical server build + package recipe (toolchain -> deps -> prune -> cache -> build ->
      # tar). Shared verbatim with deploy.yml. No DEPLOYED_SHA marker here, so the release/dispatch
      # artifact is unchanged. Leaves overmatch-server.tar.gz in the workspace root.
      - uses: ./.github/actions/build-server

      # Plain artifact for the workflow_dispatch → scp redeploy path.
      - uses: actions/upload-artifact@v4
        with:
          name: overmatch-server-x86_64-linux
          path: overmatch-server.tar.gz
          retention-days: 14
          if-no-files-found: error

  # Tag pushes only: publish the sealed server artifact from the read-only build job. This job has
  # release-write permission but performs no checkout or compilation.
  upload-server:
    needs: [create-release, build-server]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: overmatch-server-x86_64-linux
          path: dist

      - name: Attach server to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          asset="overmatch-server-${tag}-x86_64-unknown-linux-gnu.tar.gz"
          mv dist/overmatch-server.tar.gz "$asset"
          sha256sum "$asset" > "$asset.sha256"
          gh release upload "$tag" "$asset" "$asset.sha256" \
            --repo "${GITHUB_REPOSITORY}" --clobber

  # macOS client, part 1 of 2: the UNTRUSTED build. This job runs the `cargo build` (full dependency
  # graph, arbitrary build.rs / proc-macros) and holds NO Apple signing secrets — no cert import, no
  # notary key. That isolation is the whole point of the split: a compromised transitive crate here
  # cannot reach the Developer ID cert or notary key, because they are never materialized on this
  # runner. It inherits the workflow-level OVERMATCH_DEFAULT_SERVER, baking the droplet address in.
  # Tags only (skips on dispatch with create-release). If you ever add an Apple secret here, STOP —
  # it belongs in sign-macos below.
  build-macos:
    needs: create-release
    permissions:
      contents: read
    runs-on: macos-latest
    steps:
      # LFS on R2 via `.lfsconfig` — pull after checkout (checkout `lfs: true` hits GitHub).
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          lfs: false
      - name: Git LFS pull (R2)
        run: |
          git lfs install --local
          git lfs pull

      # Apple-Silicon-ONLY (2026-07-11, was universal): Intel Macs are <0.5% of Steam and macOS 26
      # is the last Intel macOS; dropping the x86_64 slice + lipo halves this job (~1h25m → one
      # arch). Steamworks depot config: "Apple Silicon Binaries Included" only.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-aarch64

      - name: Build the unsigned .app (arm64)
        run: |
          tag="${GITHUB_REF_NAME}"
          export VERSION="${tag#v}"
          ./scripts/package-macos.sh --build-only

      # actions/upload-artifact zips its input and drops the executable bit + mac metadata, which
      # corrupts a .app bundle. Pack the bundle with `ditto -c -k --keepParent` first — a ditto zip
      # preserves the bundle structure, exec bit, and resource forks — and upload that single file;
      # sign-macos re-extracts it with `ditto -x -k`.
      - name: Pack the .app for transport
        run: ditto -c -k --keepParent dist/Overmatch.app dist/Overmatch-app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: overmatch-macos-app
          path: dist/Overmatch-app.zip
          retention-days: 1
          if-no-files-found: error

  # macOS client, part 2 of 2: the TRUSTED sign. This job holds the Apple signing secrets (Developer
  # ID cert + notary key) but runs NO `cargo build` — it only operates on the pre-built .app from
  # build-macos. It produces the signed + notarized arm64 .dmg (the .app inside is also the future
  # Steam macOS depot). Tags only (inherits the skip via `needs: build-macos` -> create-release).
  sign-macos:
    needs: build-macos
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      # Only the entitlements plist, icon, and the sign script are needed here — no LFS assets (they
      # are already baked into the downloaded .app), so a plain checkout is enough.
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4
        with:
          name: overmatch-macos-app
          path: dist

      # Restore dist/Overmatch.app from the ditto zip with the exec bit + bundle structure intact.
      - name: Unpack the .app
        run: ditto -x -k dist/Overmatch-app.zip dist/

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}

      - name: Write notary API key
        env:
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/notary"
          printf '%s' "$APPLE_NOTARY_KEY" > "$RUNNER_TEMP/notary/AuthKey.p8"

      - name: Sign, notarize, package
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          NOTARY_KEY: ${{ runner.temp }}/notary/AuthKey.p8
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          tag="${GITHUB_REF_NAME}"
          export VERSION="${tag#v}"
          ./scripts/package-macos.sh --sign-only

      - name: Upload .dmg to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/overmatch-*-aarch64-apple-darwin.dmg \
            dist/overmatch-*-aarch64-apple-darwin.dmg.sha256 \
            --repo "${GITHUB_REPOSITORY}"
