name: Release

# Tag-triggered release pipeline. Cut a release by bumping `version` in
# Cargo.toml, then: git tag vX.Y.Z && git push --tags
# A matching `vX.Y.Z` tag builds every platform and publishes a GitHub Release
# with per-platform archives (binary + runtime assets).
#
# Phase 1 (now): publish to GitHub Releases.
# Phase 2 (later): the same build output feeds Steam via SteamPipe.
# Linux/Windows: binary + assets archives. macOS: signed + notarized universal .dmg.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'      # stable, e.g. v0.1.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'    # prerelease, e.g. v0.1.0-rc.1

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      # lfs: true is required because assets (*.glb, *.blend) are stored in Git
      # LFS; without it the checkout yields pointer files and broken bundles.
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Linux build dependencies
        if: contains(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev

      # Ship only runtime assets: the game loads .glb meshes; Blender source
      # files are build-time only. (.blend1 is gitignored, but prune defensively.)
      - name: Prune non-runtime assets
        shell: bash
        run: find assets -type f \( -name '*.blend' -o -name '*.blend1' \) -delete

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: overmatch
          target: ${{ matrix.target }}
          # e.g. overmatch-v0.1.0-x86_64-unknown-linux-gnu.tar.gz
          archive: $bin-$tag-$target
          # Bundle the assets/ folder next to the binary, under a top-level dir
          # so users extract a single self-contained folder.
          include: assets
          leading-dir: true
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # macOS gets its own job: a signed + notarized universal .dmg (the .app inside is
  # also the future Steam macOS depot). See scripts/package-macos.sh.
  upload-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-universal

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}

      - name: Write notary API key
        env:
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/notary"
          printf '%s' "$APPLE_NOTARY_KEY" > "$RUNNER_TEMP/notary/AuthKey.p8"

      - name: Build, sign, notarize, package
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          NOTARY_KEY: ${{ runner.temp }}/notary/AuthKey.p8
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          tag="${GITHUB_REF_NAME}"
          export VERSION="${tag#v}"
          ./scripts/package-macos.sh

      - name: Upload .dmg to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/overmatch-*-universal-apple-darwin.dmg \
            dist/overmatch-*-universal-apple-darwin.dmg.sha256 \
            --repo "${GITHUB_REPOSITORY}"
